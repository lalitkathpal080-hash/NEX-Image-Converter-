<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon – NEX Hub Tools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:     #0a0a0a;
      --bg2:    #111111;
      --bg3:    #1a1a1a;
      --accent: #2ecc71;
      --accent-dark: #27ae60;
      --white:  #f0f0f0;
      --gray1:  #888;
      --gray2:  #2e2e2e;
      --font:   'Poppins', sans-serif;
    }
    @media (prefers-color-scheme: light) {
      :root { --bg:#f4f4f4; --bg2:#fff; --bg3:#eee; --white:#111; --gray1:#555; --gray2:#ccc; }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--white);
      font-family: var(--font);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      height: 60px;
      border-bottom: 2px solid var(--accent);
      display: flex; align-items: center;
      padding: 0 20px;
      background: var(--bg);
    }
    .header-logo .nex  { font-size: 22px; font-weight: 900; color: var(--accent); letter-spacing: -0.5px; }
    .header-logo .rest { font-size: 22px; font-weight: 900; color: var(--white);  letter-spacing: -0.5px; }

    /* Main content */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .cs-card {
      text-align: center;
      max-width: 480px;
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--gray2);
      border-radius: 20px;
      padding: 52px 36px;
      animation: fadeUp 0.4s ease;
    }

    /* Animated NEX. logo */
    .cs-logo {
      font-size: 52px;
      font-weight: 900;
      letter-spacing: -2px;
      color: var(--white);
      line-height: 1;
      margin-bottom: 4px;
    }
    .cs-logo .dot { color: var(--accent); }

    /* Blinking dot animation */
    .cs-logo .dot {
      display: inline-block;
      animation: blink 1.4s ease-in-out infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.2; }
    }

    .cs-badge {
      display: inline-block;
      background: rgba(46,204,113,0.12);
      border: 1px solid rgba(46,204,113,0.3);
      color: var(--accent);
      font-size: 11px; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      padding: 5px 14px; border-radius: 20px;
      margin-bottom: 28px;
    }

    .cs-title {
      font-size: 28px; font-weight: 800;
      margin-bottom: 12px; letter-spacing: -0.4px;
      line-height: 1.25;
    }
    .cs-title span { color: var(--accent); }

    .cs-desc {
      font-size: 14px; color: var(--gray1);
      line-height: 1.75; margin-bottom: 36px;
    }

    /* Progress bar decoration */
    .cs-progress-wrap {
      background: var(--bg3);
      border-radius: 6px; height: 6px;
      overflow: hidden; margin-bottom: 32px;
    }
    .cs-progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-dark), var(--accent));
      border-radius: 6px;
      width: 0%;
      animation: loadUp 2s ease forwards 0.5s;
    }
    @keyframes loadUp {
      to { width: 72%; }
    }

    .cs-back {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent); color: #000; border: none;
      border-radius: 8px; padding: 13px 28px;
      font-family: var(--font); font-size: 13px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 1px;
      cursor: pointer; text-decoration: none;
      transition: background 0.2s ease, transform 0.18s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s;
      box-shadow: 0 4px 16px rgba(46,204,113,0.22);
    }
    .cs-back:hover { background: var(--accent-dark); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(46,204,113,0.3); }

    /* Footer */
    footer {
      text-align: center; padding: 20px 16px;
      border-top: 1px solid var(--gray2);
      font-size: 12px; color: var(--gray1);
    }
    footer strong { color: var(--accent); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <header>
    <div class="header-logo">
      <span class="nex">NEX</span><span class="rest"> Hub Tools</span>
    </div>
  </header>

  <main>
    <div class="cs-card">

      <div class="cs-logo">NEX<span class="dot">.</span></div>
      <div class="cs-badge">Coming Soon</div>

      <h1 class="cs-title">We're Building<br><span>Something Cool</span></h1>
      <p class="cs-desc">
        This tool is currently under development by the NEX team.<br>
        Stay tuned — it'll be worth the wait. 🚀
      </p>

      <div class="cs-progress-wrap">
        <div class="cs-progress-fill"></div>
      </div>

      <a class="cs-back" href="/image-converter">
        ← Back to Image Converter
      </a>

    </div>
  </main>

  <footer>
    <strong>NEX Hub Tools</strong> · Made by Lalit Kathpal · <a href="mailto:support.nexhub@gmail.com" style="color:var(--accent);text-decoration:none;">support.nexhub@gmail.com</a>
  </footer>

</body>
</html>
